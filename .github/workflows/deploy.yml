name: Deploy to EC2 (WC TEST)

on:
  push:
    branches:
      - test-deploy-WC

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 21 설정
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 3. 빌드 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # SSH 연결 테스트 추가
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_WC }}
          username: ${{ secrets.EC2_USER_WC }}
          key: ${{ secrets.EC2_SSH_KEY_WC }}
          script: |
            echo "SSH Connection Success"
            hostname
            whoami

      # 5. EC2로 JAR 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_WC }}
          username: ${{ secrets.EC2_USER_WC }}
          key: ${{ secrets.EC2_SSH_KEY_WC }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"

      # 6. EC2에서 앱 재시작
      - name: Restart App on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_WC }}
          username: ${{ secrets.EC2_USER_WC }}
          key: ${{ secrets.EC2_SSH_KEY_WC }}
          script: |
            echo "Stopping old app..."
            sudo systemctl stop appang || true

            echo "Deploying new jar..."
            JAR=$(ls -t /home/ubuntu/app/*.jar | head -n 1)
            cp "$JAR" /home/ubuntu/app/app.jar

            echo "Starting app..."
            sudo systemctl start appang

            echo "Status check"
            sudo systemctl status appang --no-pager